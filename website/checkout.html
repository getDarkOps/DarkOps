    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#000;--bg2:#0a0a0a;--bg3:#111;--t1:#fff;--t2:#aaa;--t3:#666;--green:#00ff88;--green-d:rgba(0,255,136,.12);--green-g:rgba(0,255,136,.25);--border:#1a1a1a}
        html{font-size:16px;-webkit-font-smoothing:antialiased}
        body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;min-height:100vh}
        body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

        .page{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 20px}

        /* Header */
        .checkout-hdr{display:flex;align-items:center;gap:16px;padding:24px 0 20px;border-bottom:1px solid var(--border)}
        .back-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;margin-left: -50px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;transition:all .2s;text-decoration:none;font-size:18px}
        .back-btn:hover{border-color:var(--t3);color:var(--t1);background:rgba(255,255,255,.03)}
        .checkout-logo{font-size:22px;font-weight:800;letter-spacing:-.5px}
        .checkout-logo span{color:var(--green)}

        /* Summary card */
        .summary{padding:28px 0;border-bottom:1px solid var(--border)}
        .summary-label{font-size:13px;color:var(--t3);margin-bottom:6px}
        .summary-title{font-size:14px;font-weight:600;margin-bottom:2px}
        .summary-desc{font-size:13px;color:var(--t2)}
        .summary-price{display:flex;justify-content:space-between;align-items:baseline;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
        .summary-price .label{font-size:14px;color:var(--t2)}
        .summary-price .amount{font-size:28px;font-weight:900;letter-spacing:-1px}
        .summary-price .amount span{font-size:14px;font-weight:400;color:var(--t3)}
        .summary-per{font-size:12px;color:var(--green);margin-top:4px;text-align:right}
        .summary-includes{margin-top:20px;padding:16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px}
        .summary-includes h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:10px}
        .inc-item{font-size:13px;color:var(--t2);padding:5px 0;display:flex;align-items:center;gap:8px}
        .inc-item .ck{color:var(--green);font-weight:700;font-size:14px}

        /* ThriveCart embed area */
        .checkout-embed{padding:32px 0}
        .checkout-embed-label{font-size:13px;color:var(--t3);margin-bottom:16px;text-align:center}

        /* Footer */
        .checkout-footer{padding:20px 0 40px;border-top:1px solid var(--border);display:flex;justify-content:center;gap:20px}
        .checkout-footer a{font-size:12px;color:var(--t3);text-decoration:none}
        .checkout-footer a:hover{color:var(--t2)}
        .checkout-footer .sep{color:var(--border)}
    </style>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
