<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkOps — Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{max-width:420px;width:100%;padding:40px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:16px}
        h1{font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-.5px}
        p.sub{font-size:14px;color:#888;margin-bottom:24px;line-height:1.6}
        label{display:block;font-size:13px;font-weight:600;color:#ccc;margin-bottom:6px}
        input{width:100%;padding:12px 16px;background:#111;border:1px solid #222;border-radius:8px;color:#fff;font-size:15px;font-family:inherit;margin-bottom:16px;outline:none}
        input:focus{border-color:#00ff88}
        button{width:100%;padding:14px;background:#00ff88;color:#000;font-size:15px;font-weight:700;border:none;border-radius:8px;cursor:pointer}
        button:hover{opacity:.9}
        button:disabled{opacity:.4;cursor:not-allowed}
        .error{color:#ff4444;font-size:13px;margin-bottom:12px;display:none}
        .success{text-align:center;display:none}
        .success h2{font-size:20px;margin-bottom:8px;color:#00ff88}
        .success p{color:#888;line-height:1.6}
        .back{text-align:center;margin-top:16px}
        .back a{color:#00ff88;font-size:13px;text-decoration:none}
        .back a:hover{text-decoration:underline}
    </style>
</head>
<body>

<div class="card">
    <div id="formView">
        <h1>Reset your password</h1>
        <p class="sub">Enter your email and we'll send you a link to reset your password.</p>
        <div class="error" id="errorMsg"></div>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autofocus>
        <button id="resetBtn" onclick="resetPassword()">Send Reset Link &rarr;</button>
        <div class="back"><a href="/sign-in">&larr; Back to sign in</a></div>
    </div>

    <div class="success" id="successView">
        <h2>Check your email</h2>
        <p>We sent a password reset link to your email. Click the link to set a new password. Check spam if you don't see it within a minute.</p>
        <div class="back" style="margin-top:24px"><a href="/sign-in">&larr; Back to sign in</a></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://rkudnkbpnfxpxglaklqs.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Ll3KUfVgGqeCMUTSlAd4bA_YoD-SHkA';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function resetPassword() {
    const email = document.getElementById('email').value.trim();
    const errorEl = document.getElementById('errorMsg');
    const btn = document.getElementById('resetBtn');

    errorEl.style.display = 'none';

    if (!email) {
        errorEl.textContent = 'Enter your email address.';
        errorEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending...';

    const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/set-password'
    });

    if (error) {
        errorEl.textContent = error.message || 'Something went wrong. Try again.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link \u2192';
        return;
    }

    document.getElementById('formView').style.display = 'none';
    document.getElementById('successView').style.display = 'block';
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') resetPassword();
});
</script>
</body>
</html>
